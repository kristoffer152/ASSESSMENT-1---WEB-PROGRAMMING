<!Doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="cp3.css" type="text/css">  <!-- CSS files for styling and image filters -->
    <title> Chapter 3: Images </title>
</head>
<body>
        <!-- Background Video -->
        <video autoplay muted loop id="bg-video">
            <source src="bg-video.mp4" type="video/mp4">
        </video>

        <!-- Page header -->
        <header>
            <h1>COSMIC GALAXY</h1><!--A theme which ties all three images together.-->
        </header>

        <!-- Image 1 -->
        <div class="image">
            <!-- Image with alt and title attributes-->
            <img 
                src="ss-Bi6D9BjoNEs-unsplash.jpg" 
                alt="Night sky with stars and trees"
                title="A night sky with a lot of stars and trees.">
            <h2><a href="https://unsplash.com/photos/a-night-sky-with-a-lot-of-stars-and-trees-Bi6D9BjoNEs">Night Sky</a></h2>
            <!-- Image copyright and license -->
            <p>Credits: <a href="https://unsplash.com/@dark_ness28">ᴅᴀʀᴋ ɴᴇss</a></p>
            <p>Free to use under the <a href="https://unsplash.com/license" target="blank">Unsplash License</a></p>          
        </div>

        <!-- Image 2 -->
        <div class="image">
            <!-- Image with alt, title attributes-->
            <img 
                src="vincent-guth-62V7ntlKgL8-unsplash.jpg" 
                alt="Polar lights over dark trees"
                title="Silhouette of trees near Aurora Borealis at night.">
            <h2><a href="https://unsplash.com/photos/silhouette-of-trees-near-aurora-borealis-at-night-62V7ntlKgL8">Aurora Borealis</a></h2>
            <!-- Image copyright and license -->
            <p>Credits: <a href="https://unsplash.com/@vingtcent">Vincent Guth</a></p>
            <p>Free to use under the <a href="https://unsplash.com/license" target="blank">Unsplash License</a></p>          
        </div>

        <!-- Image 3 -->
        <div class="image">
            <!-- Image with alt, title attributes-->
            <img 
                src="nasa-hubble-space-telescope-pJPvgqrvX2A-unsplash.jpg" 
                alt="The active galaxy NGC 1275"
                title="A spiral galaxy in the sky.">
            <h2><a href="https://unsplash.com/photos/an-image-of-a-spiral-galaxy-in-the-sky-pJPvgqrvX2A">Spiral Galaxy</a></h2>
            <!-- Image copyright and license -->
            <p>Credits: <a href="https://unsplash.com/@hubblespacetelescope">NASA Hubble Space Telescope</a></p>
            <p>Free to use under the <a href="https://unsplash.com/license" target="blank">Unsplash License</a></p>          
        </div>    


</body>
</html>
