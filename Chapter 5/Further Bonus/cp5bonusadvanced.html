</head>
<body>

    <!--MAIN CONTENT-->
    <main class="container">

        <!--TEXT TO SPEECH-->
        <section class="tts">
            <h2 class ="tts-title">🐟 PSYCHEDELIC FISH</h2>
            <div class="tts-row">
                <textarea id="text" placeholder="Type here"></textarea> <!--Allows presenters to type any text they like into a <textarea> element-->

            </div>
        </section>

        <!--SOUND BOARD-->
        <section class="sound"> <!--seperate column next to the audio samples-->
            <h2 class ="sound-title">Sample Bank 2</h2>
            <div class="soundboard">
            </div>

            <div class="arrow">
                <button id="left">◀</button>
                <button id="right">▶</button>
            </div>
        </section>

    </main>
